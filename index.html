<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二仁溪燈具財產保管地圖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --header-h: 52px;
      --bottom-h: 56px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
    }

    /* ═══════════ HEADER ═══════════ */
    header {
      height: var(--header-h);
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 600;
    }
    .logo {
      width: 30px; height: 30px; flex-shrink: 0;
      background: linear-gradient(135deg, #f97316, #f0b429);
      border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .header-title { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-title span { color: var(--muted); font-weight: 300; font-size: 11px; margin-left: 5px; }
    .header-stats { display: flex; gap: 12px; flex-shrink: 0; }
    .stat-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); text-align: right; }
    .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; text-align: right; }
    .icon-btn {
      width: 30px; height: 30px; flex-shrink: 0;
      background: transparent; border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--border); }

    /* ═══════════ DESKTOP LAYOUT ═══════════ */
    .layout {
      flex: 1; display: flex; overflow: hidden; position: relative;
      min-height: 0;
    }

    /* Sidebar — desktop */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, opacity 0.2s ease;
      z-index: 300;
    }
    .sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }
    .sidebar-inner { width: 240px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }

    .sb-section { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sb-section h2 {
      font-size: 9px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .legend-items { display: flex; flex-direction: column; gap: 3px; }
    .legend-item {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      padding: 4px 6px; border-radius: 5px; transition: background 0.15s;
      user-select: none; white-space: nowrap;
    }
    .legend-item:hover { background: rgba(255,255,255,0.05); }
    .legend-item.off { opacity: 0.28; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 11px; flex: 1; }
    .legend-count {
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
      background: var(--bg); padding: 1px 5px; border-radius: 3px;
    }
    .filter-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--bg); border: 1px solid var(--border); color: var(--muted);
      padding: 3px 10px; border-radius: 20px; font-size: 11px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
    .info-panel { flex: 1; padding: 12px 14px; overflow-y: auto; }
    .info-panel h2 {
      font-size: 9px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .info-card { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; display: none; }
    .info-card.visible { display: block; }
    .info-card-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .info-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
    .info-row:last-child { border: none; }
    .info-key { color: var(--muted); }
    .info-val { font-family: 'DM Mono', monospace; font-size: 10px; }
    .no-select { font-size: 11px; color: var(--muted); line-height: 1.9; }

    /* Map */
    #map { flex: 1; min-width: 0; }

    /* Map overlay buttons */
    .map-overlay {
      position: absolute; right: 10px; z-index: 500;
      display: flex; flex-direction: column; gap: 4px;
    }
    .map-overlay.top { top: 10px; }
    .map-overlay.bottom { bottom: 36px; }
    .ov-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: 5px 9px; border-radius: 6px;
      font-size: 11px; cursor: pointer; font-family: inherit;
      transition: all 0.15s; white-space: nowrap; text-align: left;
    }
    .ov-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ov-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
    .ov-btn.round {
      width: 36px; height: 36px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; border-radius: 8px;
    }
    .ov-btn.locating { color: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ═══════════ MOBILE BOTTOM SHEET ═══════════ */
    .bottom-nav {
      display: none;
      height: var(--bottom-h);
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0; z-index: 600;
      align-items: stretch;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; border: none; background: transparent;
      color: var(--muted); font-family: inherit;
      transition: color 0.15s; font-size: 10px; letter-spacing: 0.03em;
    }
    .nav-tab .tab-icon { font-size: 19px; }
    .nav-tab.active { color: var(--accent); }

    /* Mobile panel (bottom sheet) */
    .mobile-panel {
      display: none;
      position: fixed; left: 0; right: 0; bottom: var(--bottom-h);
      background: var(--surface); border-top: 1px solid var(--border);
      z-index: 500; max-height: 55dvh; overflow-y: auto;
      transform: translateY(100%); transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    }
    .mobile-panel.open { transform: translateY(0); }
    .panel-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .panel-body { padding: 12px 16px 20px; }

    /* Mobile info drawer */
    .mobile-info {
      display: none;
      position: fixed; left: 0; right: 0; bottom: var(--bottom-h);
      background: var(--surface); border-top: 2px solid var(--accent);
      z-index: 510; padding: 14px 16px 20px;
      transform: translateY(100%); transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    }
    .mobile-info.open { transform: translateY(0); }
    .mobile-info-close {
      position: absolute; top: 10px; right: 14px;
      background: var(--bg); border: 1px solid var(--border); color: var(--muted);
      width: 26px; height: 26px; border-radius: 5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }

    /* ═══════════ RESPONSIVE ═══════════ */
    @media (max-width: 640px) {
      .sidebar { display: none !important; }
      .bottom-nav { display: flex; }
      .mobile-panel { display: block; }
      .mobile-info { display: block; }
      .header-title span { display: none; }
      .map-overlay.top { top: 10px; right: 8px; }
      .map-overlay.bottom { bottom: calc(var(--bottom-h) + 10px); right: 8px; }
    }

    /* Leaflet dark */
    .leaflet-container { background: #0d1117; }
    .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-attribution { background: rgba(13,17,23,0.75) !important; color: var(--muted) !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: var(--accent) !important; }
    .leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; }
    .popup-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .popup-row { display: flex; justify-content: space-between; gap: 10px; font-size: 11px; padding: 2px 0; border-bottom: 1px solid var(--border); }
    .popup-row:last-child { border: none; }
    .popup-key { color: var(--muted); }
    .popup-val { font-family: 'DM Mono', monospace; font-size: 10px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <!-- Desktop: sidebar toggle -->
  <button class="icon-btn desktop-only" onclick="toggleSidebar()" style="display:flex">☰</button>
  <div class="logo">💡</div>
  <div class="header-title">二仁溪燈具財產保管清冊 <span>地圖視覺化</span></div>
  <div class="header-stats">
    <div>
      <div class="stat-val" id="visible-count">460</div>
      <div class="stat-label">顯示中</div>
    </div>
    <div>
      <div class="stat-val">460</div>
      <div class="stat-label">總燈具</div>
    </div>
  </div>
</header>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- Desktop Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sb-section">
        <h2>圖例 · 燈具類型</h2>
        <div class="legend-items" id="legend-desktop"></div>
      </div>
      <div class="sb-section">
        <h2>篩選 · 期別</h2>
        <div class="filter-row" id="filter-desktop"></div>
      </div>
      <div class="info-panel">
        <h2>選取資訊</h2>
        <div id="info-card" class="info-card">
          <div id="info-title" class="info-card-title"></div>
          <div id="info-rows"></div>
        </div>
        <div id="no-select" class="no-select">點擊地圖上的<br>標記可查看詳細資料。</div>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Basemap switcher -->
  <div class="map-overlay top">
    <button class="ov-btn active" onclick="switchBase('osm',this)">🗺 街道圖</button>
    <button class="ov-btn" onclick="switchBase('topo',this)">🗾 電子地圖</button>
    <button class="ov-btn" onclick="switchBase('sat',this)">🛰 衛星影像</button>
  </div>

  <!-- Locate button -->
  <div class="map-overlay bottom">
    <button class="ov-btn round" id="locate-btn" onclick="locateMe()">📍</button>
  </div>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-tab active" id="tab-map" onclick="showTab('map')">
    <span class="tab-icon">🗺</span>地圖
  </button>
  <button class="nav-tab" id="tab-legend" onclick="showTab('legend')">
    <span class="tab-icon">🔆</span>圖例
  </button>
  <button class="nav-tab" id="tab-filter" onclick="showTab('filter')">
    <span class="tab-icon">🔍</span>篩選
  </button>
  <button class="nav-tab" id="tab-locate" onclick="locateMe()">
    <span class="tab-icon" id="locate-icon">📍</span>定位
  </button>
</nav>

<!-- MOBILE: Legend panel -->
<div class="mobile-panel" id="panel-legend">
  <div class="panel-drag"></div>
  <div class="panel-body">
    <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">圖例 · 燈具類型</div>
    <div class="legend-items" id="legend-mobile"></div>
  </div>
</div>

<!-- MOBILE: Filter panel -->
<div class="mobile-panel" id="panel-filter">
  <div class="panel-drag"></div>
  <div class="panel-body">
    <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">篩選 · 期別</div>
    <div class="filter-row" id="filter-mobile"></div>
  </div>
</div>

<!-- MOBILE: Info drawer -->
<div class="mobile-info" id="mobile-info">
  <button class="mobile-info-close" onclick="closeMobileInfo()">✕</button>
  <div id="mobile-info-title" style="font-size:14px;font-weight:600;margin-bottom:10px;margin-right:30px;"></div>
  <div id="mobile-info-rows"></div>
</div>

const TYPES = [
  { key: '五期-景觀矮燈', label: '五期 景觀矮燈', color: '#f0b429', count: 167 },
  { key: '五期-景觀高燈', label: '五期 景觀高燈', color: '#f97316', count: 106 },
  { key: '六期-太陽能燈', label: '六期 太陽能燈', color: '#4ade80', count: 69  },
  { key: '六期-高燈',     label: '六期 高燈',     color: '#fb923c', count: 20  },
  { key: '六期-矮燈',     label: '六期 矮燈',     color: '#fbbf24', count: 98  },
];

// ── Build legend & filter in both desktop and mobile ──
function buildLegend(container, suffix) {
  container.innerHTML = TYPES.map(t => `
    <div class="legend-item" data-type="${t.key}" id="li-${suffix}-${t.key.replace(/[^a-z0-9]/gi,'_')}" onclick="toggleType('${t.key}')">
      <div class="dot" style="background:${t.color}"></div>
      <div class="legend-label">${t.label}</div>
      <div class="legend-count">${t.count}</div>
    </div>`).join('');
}
buildLegend(document.getElementById('legend-desktop'), 'd');
buildLegend(document.getElementById('legend-mobile'), 'm');

const PERIODS = ['all','五期','六期'];
const PERIOD_LABELS = { all:'全部', '五期':'五期', '六期':'六期' };
function buildFilter(container, suffix) {
  container.innerHTML = PERIODS.map(p => `
    <button class="filter-btn ${p==='all'?'active':''}" id="fb-${suffix}-${p}" onclick="filterPeriod('${p}','${suffix}')">${PERIOD_LABELS[p]}</button>`
  ).join('');
}
buildFilter(document.getElementById('filter-desktop'), 'd');
buildFilter(document.getElementById('filter-mobile'), 'm');

// ── Map ──
const map = L.map('map', { zoomControl: true }).setView([22.9145, 120.2322], 13);

const basemaps = {
  osm:  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom:19 }),
  topo: L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP5/default/GoogleMapsCompatible/{z}/{y}/{x}.png', { attribution:'© <a href="https://maps.nlsc.gov.tw">國土測繪中心</a>', maxZoom:20 }),
  sat:  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri, Maxar', maxZoom:19 }),
};
const satLabel = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity:0.35, maxZoom:19 });
let currentBase = 'osm';
basemaps.osm.addTo(map);

function switchBase(key, btn) {
  if (currentBase === key) return;
  map.removeLayer(basemaps[currentBase]);
  if (currentBase==='sat') map.removeLayer(satLabel);
  basemaps[key].addTo(map);
  if (key==='sat') satLabel.addTo(map);
  currentBase = key;
  document.querySelectorAll('.map-overlay.top .ov-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Markers ──
let markers = [], activeTypes = new Set(TYPES.map(t=>t.key)), currentPeriod = 'all';

function getTypeKey(p) { return p['期別']+'-'+p['燈具類型']; }
function getColor(typeKey) { return (TYPES.find(t=>t.key===typeKey)||{}).color || '#fff'; }

function makeIcon(color) {
  return L.divIcon({
    className:'',
    html:`<div style="width:11px;height:11px;border-radius:50%;background:${color};border:1.5px solid rgba(0,0,0,0.5);box-shadow:0 0 5px ${color}99"></div>`,
    iconSize:[11,11], iconAnchor:[5.5,5.5],
  });
}

function infoRows(p) {
  return [
    ['期別',p['期別']],['區段',p['區段']],['燈具類型',p['燈具類型']],
    ['型號',p['型號']||'—'],['廠商',p['廠商']],['單價',p['單價'].toLocaleString()+' 元'],
  ];
}

function makePopupHtml(p, color) {
  return `<div class="popup-title" style="color:${color}">${p['財產名稱']}</div>`
    + infoRows(p).map(([k,v])=>`<div class="popup-row"><span class="popup-key">${k}</span><span class="popup-val">${v}</span></div>`).join('');
}

const isMobile = () => window.innerWidth <= 640;

GEOJSON.features.forEach(feat => {
  const [lng, lat] = feat.geometry.coordinates;
  const p = feat.properties;
  const typeKey = getTypeKey(p);
  const color = getColor(typeKey);
  const marker = L.marker([lat,lng],{icon:makeIcon(color)});
  marker._props = p; marker._typeKey = typeKey;
  marker.bindPopup(makePopupHtml(p,color),{maxWidth:220});
  marker.on('click', () => {
    if (isMobile()) { showMobileInfo(p, color); }
    else { showDesktopInfo(p, color); }
  });
  markers.push(marker);
});

function updateVisible() {
  let count = 0;
  markers.forEach(m => {
    const show = activeTypes.has(m._typeKey) && (currentPeriod==='all' || m._props['期別']===currentPeriod);
    if (show) { m.addTo(map); count++; } else m.remove();
  });
  document.getElementById('visible-count').textContent = count;
}
updateVisible();

// ── Desktop info ──
function showDesktopInfo(p, color) {
  document.getElementById('no-select').style.display = 'none';
  const card = document.getElementById('info-card');
  card.classList.add('visible');
  document.getElementById('info-title').textContent = p['財產名稱'];
  document.getElementById('info-title').style.color = color;
  document.getElementById('info-rows').innerHTML = infoRows(p)
    .map(([k,v])=>`<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('');
  const sb = document.getElementById('sidebar');
  if (sb.classList.contains('collapsed')) toggleSidebar();
}

// ── Mobile info ──
function showMobileInfo(p, color) {
  const el = document.getElementById('mobile-info');
  document.getElementById('mobile-info-title').textContent = p['財產名稱'];
  document.getElementById('mobile-info-title').style.color = color;
  document.getElementById('mobile-info-rows').innerHTML = infoRows(p)
    .map(([k,v])=>`<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('');
  closeAllPanels();
  el.classList.add('open');
}
function closeMobileInfo() {
  document.getElementById('mobile-info').classList.remove('open');
}

// ── Toggle type ──
function toggleType(typeKey) {
  if (activeTypes.has(typeKey)) activeTypes.delete(typeKey);
  else activeTypes.add(typeKey);
  // sync both desktop and mobile legend items
  document.querySelectorAll(`.legend-item[data-type="${typeKey}"]`).forEach(el => {
    el.classList.toggle('off', !activeTypes.has(typeKey));
  });
  updateVisible();
}

// ── Filter period ──
function filterPeriod(period, suffix) {
  currentPeriod = period;
  ['d','m'].forEach(s => {
    document.querySelectorAll(`#filter-${s==='d'?'desktop':'mobile'} .filter-btn`).forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`fb-${s}-${period}`);
    if (btn) btn.classList.add('active');
  });
  updateVisible();
}

// ── Sidebar (desktop) ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ── Mobile tabs ──
let activePanel = null;
function closeAllPanels() {
  ['panel-legend','panel-filter'].forEach(id => document.getElementById(id).classList.remove('open'));
}
function showTab(tab) {
  if (tab === 'map') {
    closeAllPanels();
    closeMobileInfo();
    activePanel = null;
  } else {
    const panelId = 'panel-' + tab;
    const isOpen = document.getElementById(panelId).classList.contains('open');
    closeAllPanels();
    closeMobileInfo();
    if (!isOpen) { document.getElementById(panelId).classList.add('open'); activePanel = tab; }
    else activePanel = null;
  }
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+(activePanel||'map')).classList.add('active');
}

// ── Locate ──
let locateMarker = null, locateCircle = null;
function locateMe() {
  const btn = document.getElementById('locate-btn');
  const icon = document.getElementById('locate-icon');
  if (!navigator.geolocation) { alert('瀏覽器不支援定位'); return; }
  if (btn) { btn.classList.add('locating'); btn.textContent='⌛'; }
  if (icon) icon.textContent = '⌛';

  navigator.geolocation.getCurrentPosition(
    pos => {
      if (btn) { btn.classList.remove('locating'); btn.textContent='📍'; }
      if (icon) icon.textContent = '📍';
      const { latitude:lat, longitude:lng, accuracy } = pos.coords;
      map.setView([lat, lng], 16);
      if (locateMarker) { locateMarker.remove(); locateCircle.remove(); }
      locateCircle = L.circle([lat,lng],{ radius:accuracy, color:'#58a6ff', fillColor:'#58a6ff', fillOpacity:0.1, weight:1 }).addTo(map);
      locateMarker = L.circleMarker([lat,lng],{ radius:8, color:'#fff', weight:2, fillColor:'#58a6ff', fillOpacity:1 })
        .addTo(map).bindPopup(`<b style="color:#58a6ff">📍 您的位置</b><br><small style="color:#8b949e">精度：±${Math.round(accuracy)}m</small>`).openPopup();
      if (isMobile()) {
        closeAllPanels();
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-map').classList.add('active');
      }
    },
    err => {
      if (btn) { btn.classList.remove('locating'); btn.textContent='📍'; }
      if (icon) icon.textContent = '📍';
      const msg = { 1:'請允許瀏覽器存取位置權限', 2:'無法取得位置資訊', 3:'定位請求逾時' };
      alert(msg[err.code] || '定位失敗');
    },
    { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
  );
}

// Close panels when tapping map
map.on('click', () => {
  if (isMobile()) {
    closeAllPanels();
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-map').classList.add('active');
    activePanel = null;
  }
});
</script>
</body>
